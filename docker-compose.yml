version: '3.8'

services:
  # 1. ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: log_monitor_db
    ports:
      - "8123:8123" # HTTP Interface
      - "9000:9000" # Native Client Interface
    environment:
      - CLICKHOUSE_DB=logs
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=login123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - log_network

  # 1b. InfluxDB (v2) Database for Monitoring
  influxdb:
    image: influxdb:2
    container_name: monitoring_db
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123
      - DOCKER_INFLUXDB_INIT_ORG=monitoring-org
      - DOCKER_INFLUXDB_INIT_BUCKET=monitoring
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - log_network
    restart: always

  # 2. Log Backend API
  backend:
    build: ./backend
    container_name: log_monitor_backend
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "5002:5002"
    env_file:
      - ./backend/.env
    environment:
      # These override values from .env
      - HOST=0.0.0.0
      - CLICKHOUSE_HOST=http://clickhouse:8123
    networks:
      - log_network
    restart: always

  # 3. Log Frontend UI
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SERVER_URL=/monitoring
        - VITE_API_BASE_URL=http://172.27.13.44:5002
    container_name: log_monitor_frontend
    depends_on:
      - backend
    ports:
      - "80:80" # Host Port 80 -> Container 80
    networks:
      - log_network
    restart: always

  # 4. Monitoring Backend (Discovery/Storage)
  monitoring_backend:
    build: ./monitoring-server
    container_name: monitoring_backend
    env_file:
      - ./backend/.env
    depends_on:
      - influxdb
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_TYPE=influxdb
      - INFLUXDB_HOST=http://influxdb:8086
      - INFLUXDB_TOKEN=my-super-secret-auth-token
      - INFLUXDB_ORG=monitoring-org
      - INFLUXDB_BUCKET=monitoring
    networks:
      - log_network
    restart: always

  # 5. Monitoring Agent
  monitoring_agent:
    build: ./monitoring-agent
    container_name: monitoring_agent
    depends_on:
      - monitoring_backend
    # Use host network for accurate system monitoring or volume mount /host if possible.
    # We will use privileged / PID / Network host mode for the agent to get true host metrics.
    pid: "host"
    network_mode: "host"
    privileged: true
    volumes:
      - /:/hostfs:ro # Allow container to read host filesystem info
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allow checking docker
      - /run/systemd/private:/run/systemd/private:ro # Allow checking systemd if passed
    environment:
      - SERVER_URL=http://localhost:5000
      - VM_ID=vm-host-agent
      - HOSTNAME=docker-host
    restart: always

volumes:
  clickhouse_data:
  influxdb_data:


networks:
  log_network:
    driver: bridge
